# Portal Scanner Configuration — Viet Bui
# Tuned for: exchange listings / Web3 BD / partnerships / community roles,
# with non-crypto sales/AM/ops as fallback. Inverted from the AI-engineering
# defaults (crypto/web3 moved from negative to positive).

title_filter:
  positive:
    # -- Listings / BD / partnerships --
    - "Listing"
    - "Listings"
    - "Business Development"
    - "BD Manager"
    - "Partnership"
    - "Partnerships"
    - "Alliances"
    - "Ecosystem"
    - "Growth"
    # -- Crypto / Web3 --
    - "Web3"
    - "Crypto"
    - "Blockchain"
    - "Token"
    - "NFT"
    - "DeFi"
    - "Exchange"
    # -- Community --
    - "Community"
    - "Discord"
    - "Ambassador"
    # -- Fallback: sales / AM / ops --
    - "Account Manager"
    - "Account Executive"
    - "Customer Success"
    - "Sales Development"
    - "SDR"
    - "BDR"
    - "Operations Manager"
    # -- New categories (added 2026-06-10) --
    - "Social Media"
    - "Content Manager"
    - "Marketing Coordinator"
    - "Administrative Assistant"
    - "Executive Assistant"
    - "Virtual Assistant"
    - "Office Manager"
    - "Operations Coordinator"
    - "Customer Support"
    - "Moderator"
    - "Event"
  negative:
    - "Intern"
    - "Unpaid"
    - "Engineer"
    - "Developer"
    - "Scientist"
    - "Designer"
    - "Architect"
    - "Counsel"
    - "Attorney"
    - "Accountant"
    - "Auditor"
    - "Nurse"
    - "Physician"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
search_queries:
  - name: Web3.career — listings
    query: 'site:web3.career "listing" OR "listings" remote'
    enabled: true

  - name: Web3.career — BD
    query: 'site:web3.career "business development" OR "partnerships" remote'
    enabled: true

  - name: CryptocurrencyJobs — BD
    query: 'site:cryptocurrencyjobs.co "business development" OR "partnerships" OR "listings"'
    enabled: true

  - name: CryptoJobsList — BD
    query: 'site:cryptojobslist.com "business development" OR "listings" OR "partnerships" remote'
    enabled: true

  - name: Greenhouse — crypto BD
    query: 'site:boards.greenhouse.io crypto OR web3 "business development" OR "partnerships" remote'
    enabled: true

  - name: Lever — crypto BD
    query: 'site:jobs.lever.co crypto OR exchange "business development" OR "listings" remote'
    enabled: true

  - name: Ashby — web3 BD
    query: 'site:jobs.ashbyhq.com web3 OR crypto "business development" OR "partnerships" remote'
    enabled: true

  - name: a16z crypto portfolio
    query: 'site:jobs.a16zcrypto.com "business development" OR "partnerships" OR "community"'
    enabled: true

  - name: RemoteOK — sales fallback
    query: 'site:remoteok.com "account executive" OR "business development" remote US'
    enabled: true

  - name: WeWorkRemotely — sales fallback
    query: 'site:weworkremotely.com "account manager" OR "business development" OR "customer success"'
    enabled: true

  - name: AI startups — entry BD/SDR
    query: 'site:jobs.ashbyhq.com OR site:boards.greenhouse.io AI "sales development representative" OR "business development representative" remote entry'
    enabled: true

  - name: Social media — remote
    query: 'site:weworkremotely.com OR site:remoteok.com "social media manager" OR "social media coordinator" remote'
    enabled: true

  - name: Crypto social/community
    query: 'site:cryptojobslist.com OR site:web3.career "social media" OR "community manager" remote'
    enabled: true

  - name: Admin/EA — remote
    query: 'site:weworkremotely.com OR site:remoteok.com "executive assistant" OR "administrative assistant" OR "virtual assistant" remote US'
    enabled: true

